basePath: /
definitions:
  internal_adapters_handler.CreatePostRequest:
    properties:
      content:
        minLength: 10
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - content
    - title
    type: object
  internal_adapters_handler.CreatePostResponse:
    properties:
      message:
        type: string
      redirect_url:
        type: string
    type: object
  internal_adapters_handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_adapters_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_adapters_handler.LoginResponse:
    properties:
      message:
        type: string
    type: object
  internal_adapters_handler.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  internal_adapters_handler.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        minLength: 3
        type: string
      last_name:
        minLength: 3
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  internal_adapters_handler.RegisterResponse:
    properties:
      message:
        type: string
    type: object
  internal_adapters_handler.UserResponse:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API server for the User Service.
  title: User Service API
  version: "1.0"
paths:
  /posts:
    post:
      consumes:
      - application/json
      description: Create a new post for the authenticated user.
      parameters:
      - description: Post details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handler.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adapters_handler.CreatePostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create post
      tags:
      - posts
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return access and refresh tokens via HttpOnly
        cookies.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_handler.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
      summary: Login
      tags:
      - users
  /users/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current user's session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_handler.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - users
  /users/me:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_handler.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /users/register:
    post:
      consumes:
      - application/json
      description: Create a new user account.
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adapters_handler.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapters_handler.ErrorResponse'
      summary: Register
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

  /users/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current user's session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.LogoutResponse'
        "401":
          description: Unauthorized
          schema:

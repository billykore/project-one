host: localhost:8080
info:
  contact: {}
  description: This is the API server for the User Service.
  title: User Service API
  version: "1.0"
paths:
  /posts:
    get:
      description: Retrieve all posts for the authenticated user.
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.PostResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user posts
      tags:
      - posts
    post:
      consumes:
      - application/json
      description: Create a new post for the authenticated user.
      parameters:
      - description: Post details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.CreatePostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create post
      tags:
      - posts
  /posts/{id}:
    delete:
      description: Soft delete a post for the authenticated user.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete post
      tags:
      - posts
    get:
      description: Retrieve a specific post by its ID.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      summary: Get post by ID
      tags:
      - posts
    put:
      consumes:
      - application/json
      description: Update an existing post for the authenticated user.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      - description: Post details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update post
      tags:
      - posts
  /users/{userId}/follow:
    post:
      consumes:
      - application/json
      description: Allows an authenticated user to follow another user.
      parameters:
      - description: User ID to follow
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.FollowResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      security:
      - BearerAuth: []

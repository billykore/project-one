basePath: /
definitions:
  dto.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        minLength: 8
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.CommentResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  dto.CreateCommentRequest:
    properties:
      content:
        minLength: 1
        type: string
      id:
        minimum: 1
        type: integer
    required:
    - content
    - id
    type: object
  dto.CreatePostRequest:
    properties:
      content:
        minLength: 10
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - content
    - title
    type: object
  dto.CreatePostResponse:
    properties:
      id:
        type: integer
      message:
        type: string
    type: object
  dto.EditCommentRequest:
    properties:
      content:
        minLength: 1
        type: string
    required:
    - content
    type: object
  dto.FeedResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.PostItem'
        type: array
      has_more:
        type: boolean
      next_cursor:
        type: string
    type: object
  dto.FollowData:
    properties:
      followed_at:
        type: string
      followed_username:
        type: string
    type: object
  dto.FollowResponse:
    properties:
      data:
        $ref: '#/definitions/dto.FollowData'
      message:
        type: string
    type: object
  dto.FollowerResponse:
    properties:
      followed_at:
        type: string
      is_mutual:
        type: boolean
      name:
        type: string
      username:
        type: string
    type: object
  dto.FollowingResponse:
    properties:
      followed_at:
        type: string
      is_mutual:
        type: boolean
      name:
        type: string
      username:
        type: string
    type: object
  dto.LikeResponse:
    properties:
      like_count:
        type: integer
      liked:
        type: boolean
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      message:
        type: string
      username:
        type: string
    type: object
  dto.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  dto.MessageResponse:
    properties:
      message:
        type: string
    type: object
  dto.NotificationResponse:
    properties:
      actor_id:
        type: integer
      actor_username:
        type: string
      body:
        type: string
      comment_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      post_id:
        type: integer
      title:
        type: string
      type:
        type: string
      user_id:
        type: integer
    type: object
  dto.PostItem:
    properties:
      author:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      like_count:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.PostResponse:
    properties:
      author:
        type: string
      comments:
        items:
          $ref: '#/definitions/dto.CommentResponse'
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      like_count:
        type: integer
      message:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.ProblemDetail:
    properties:
      code:
        type: string
      detail:
        type: string
      errors:
        items:
          $ref: '#/definitions/dto.ValidationError'
        type: array
      instance:
        type: string
      request_id:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        minLength: 3
        type: string
      last_name:
        minLength: 3
        type: string
      password:
        minLength: 8
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  dto.RegisterResponse:
    properties:
      message:
        type: string
    type: object
  dto.UnfollowResponse:
    properties:
      message:
        type: string
    type: object
  dto.UpdatePostRequest:
    properties:
      content:
        type: string
      title:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      first_name:
        maxLength: 100
        minLength: 3
        type: string
      last_name:
        maxLength: 100
        minLength: 3
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - first_name
    - last_name
    - username
    type: object
  dto.UpdateProfileResponse:
    properties:
      message:
        type: string
      username:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      name:
        type: string
      username:
        type: string
    type: object
  dto.ValidationError:
    properties:
      field:
        type: string
      message:
        type: string
      reason:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API server for the User Service.
  title: User Service API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return access and refresh tokens via HttpOnly
        cookies.
      parameters:
      - description: Login credentials
        in: body
        name: LoginRequest
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current user's session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account.
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      summary: Register
      tags:
      - auth
  /comments/{id}:
    delete:
      description: Delete an existing comment by the author.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Delete comment
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Edit an existing comment by the author.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comment update content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EditCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Edit comment
      tags:
      - comments
  /feeds:
    get:
      description: Returns paginated posts from users the authenticated user follows
        and their own posts.
      parameters:
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Items per page (1-50, default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.FeedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Get feed
      tags:
      - feeds
  /notifications:
    get:
      consumes:
      - application/json
      description: Retrieve notifications for the authenticated user.
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.NotificationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Get notifications
      tags:
      - notifications
  /notifications/{id}/read:
    put:
      description: Mark a specific notification as read.
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - notifications
  /notifications/read-all:
    put:
      description: Mark all notifications for the authenticated user as read.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - notifications
  /posts:
    get:
      description: Retrieve all posts for the authenticated user.
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PostResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Get user posts
      tags:
      - posts
    post:
      consumes:
      - application/json
      description: Create a new post for the authenticated user.
      parameters:
      - description: Post details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreatePostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Create post
      tags:
      - posts
  /posts/{id}:
    delete:
      description: Soft delete a post for the authenticated user.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Delete post
      tags:
      - posts
    get:
      description: Retrieve a specific post by its ID.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      summary: Get post by ID
      tags:
      - posts
    put:
      consumes:
      - application/json
      description: Update an existing post for the authenticated user.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      - description: Post details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Update post
      tags:
      - posts
  /posts/{id}/comments:
    post:
      consumes:
      - application/json
      description: Create a new comment on a post.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comment details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Create comment
      tags:
      - posts
      - comments
  /posts/{id}/likes:
    delete:
      description: Unlike a post idempotently.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LikeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Unlike post
      tags:
      - posts
      - likes
    get:
      description: Get the like count and the current user's like status for a post.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LikeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Get like status
      tags:
      - posts
      - likes
    post:
      description: Like a post idempotently.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LikeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Like post
      tags:
      - posts
      - likes
  /users/{username}:
    get:
      consumes:
      - application/json
      description: Get a user by their username.
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      summary: Get user
      tags:
      - users
  /users/{username}/followers:
    delete:
      consumes:
      - application/json
      description: Allows an authenticated user to unfollow another user.
      parameters:
      - description: Username to unfollow
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UnfollowResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Unfollow a user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get the list of users following the currently authenticated user.
      parameters:
      - description: Limit for pagination
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.FollowerResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
      security:
      - BearerAuth: []
      summary: Get followers list
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Allows an authenticated user to follow another user.
      parameters:
      - description: Username to follow
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.FollowResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ProblemDetail'
        "500":
          description: Internal Server Error
          schema:

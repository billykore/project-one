        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_api_dto.ErrorResponse'
      summary: Login
      tags:

basePath: /
definitions:
  github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.LoginResponse:
    properties:
      message:
        type: string
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        minLength: 3
        type: string
      last_name:
        minLength: 3
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.RegisterResponse:
    properties:
      message:
        type: string
    type: object
  github_com_billykore_project-one_internal_app_user_adapters_dto.UserResponse:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API server for the User Service.
  title: User Service API
  version: "1.0"
paths:
  /user/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return access and refresh tokens via HttpOnly
        cookies.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
      summary: Login
      tags:
      - users
  /user/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current user's session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - users
  /user/me:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /user/register:
    post:
      consumes:
      - application/json
      description: Create a new user account.
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_billykore_project-one_internal_app_user_adapters_dto.ErrorResponse'
      summary: Register
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
